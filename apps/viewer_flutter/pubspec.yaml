name: viewer_flutter
description: Minimal read-only Flutter viewer skeleton for TabletBimEngine C API.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.2
  file_selector: ^1.0.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/sample_project.json
    - assets/render_scene.json
